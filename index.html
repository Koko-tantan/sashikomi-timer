<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KvK 差し込みタイマー</title>

<style>
body{
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:10px;
}

#utcClock{
    font-size:38px;
    color:#00ffcc;
    margin-bottom:25px;
}

.input-group{
    margin:15px 0;
}

input{
    font-size:22px;
    padding:10px;
    width:180px;
    text-align:center;
    border-radius:8px;
    border:none;
}

button{
    font-size:24px;
    padding:12px 28px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:20px;
}

#goUtc{
    margin-top:30px;
    font-size:28px;
    color:#ffd700;
}

#countdown{
    margin-top:20px;
    font-size:90px;
    font-weight:bold;
}

.yellow{
    color:#ffcc00;
}

.red{
    color:#ff4444;
}

.green{
    color:#00ff66;
}

.small{
    font-size:22px;
    margin-top:10px;
    opacity:0.8;
}
</style>
</head>

<body>

<h1>差し込みタイマー</h1>

<div id="utcClock">--:--:--.---</div>

<div class="input-group">
    <div>集結残り時間</div>
    <input id="remainMin" type="number" value="3" min="0"> 分
    <input id="remainSec" type="number" value="0" min="0" max="59"> 秒
</div>

<div class="input-group">
    <div>敵行軍時間（秒）</div>
    <input id="enemyMarch" type="number" step="0.1" value="45.0">
</div>

<div class="input-group">
    <div>自分行軍時間（秒）</div>
    <input id="myMarch" type="number" step="0.1" value="12.0">
</div>

<div class="input-group">
    <div>ラグ補正（ms）</div>
    <input id="offset" type="number" value="0">
</div>

<button onclick="startTimer()">集結確認</button>

<div id="goUtc"></div>
<div class="small" id="arrivalUtc"></div>

<div id="countdown">--</div>

<script>

// ===== 高精度UTC =====

const baseUtc = Date.now();
const basePerf = performance.now();

function accurateNow(){
    return baseUtc + (performance.now() - basePerf);
}

function updateUTCClock(){

    const now = new Date(accurateNow());

    const text =
        String(now.getUTCHours()).padStart(2,"0") + ":" +
        String(now.getUTCMinutes()).padStart(2,"0") + ":" +
        String(now.getUTCSeconds()).padStart(2,"0") + "." +
        String(now.getUTCMilliseconds()).padStart(3,"0");

    document.getElementById("utcClock").textContent =
        "UTC " + text;

    requestAnimationFrame(updateUTCClock);
}

updateUTCClock();


// ===== タイマー =====

let goTime = 0;

function startTimer(){

    const remainMin =
        parseFloat(document.getElementById("remainMin").value) || 0;

    const remainSec =
        parseFloat(document.getElementById("remainSec").value) || 0;

    const enemyMarch =
        parseFloat(document.getElementById("enemyMarch").value) || 0;

    const myMarch =
        parseFloat(document.getElementById("myMarch").value) || 0;

    const offset =
        parseFloat(document.getElementById("offset").value) || 0;

    // 集結残り秒
    const remainTotal =
        (remainMin * 60) + remainSec;

    // 今UTC
    const now = accurateNow();

    // 敵着弾UTC
    const enemyArrival =
        now +
        (remainTotal * 1000) +
        (enemyMarch * 1000);

    // GO UTC
    goTime =
        enemyArrival -
        (myMarch * 1000) +
        offset;

    // 表示
    const arrivalDate = new Date(enemyArrival);

    const goDate = new Date(goTime);

    document.getElementById("arrivalUtc").textContent =
        "敵着弾UTC : " +
        formatUTC(arrivalDate);

    document.getElementById("goUtc").textContent =
        "GO UTC : " +
        formatUTC(goDate);
}

function formatUTC(date){

    return (
        String(date.getUTCHours()).padStart(2,"0") + ":" +
        String(date.getUTCMinutes()).padStart(2,"0") + ":" +
        String(date.getUTCSeconds()).padStart(2,"0") + "." +
        String(date.getUTCMilliseconds()).padStart(3,"0")
    );
}


// ===== カウントダウン =====

function updateCountdown(){

    const countdown =
        document.getElementById("countdown");

    if(goTime === 0){

        requestAnimationFrame(updateCountdown);
        return;
    }

    const remain =
        (goTime - accurateNow()) / 1000;

    if(remain <= 0){

        countdown.textContent = "GO!";
        countdown.className = "green";

    }else{

        countdown.textContent =
            remain.toFixed(1);

        if(remain <= 1){

            countdown.className = "red";

        }else if(remain <= 3){

            countdown.className = "yellow";

        }else{

            countdown.className = "";
        }
    }

    requestAnimationFrame(updateCountdown);
}

updateCountdown();

</script>

</body>
</html>
